description: phase4 emotion — winner recipe x 6 models x 3 briefs
prompts:
- label: brand_strategy
  raw: 'You are a brand strategy consultant. From the company information below, distill the feelings or emotions the company seeks to spur, in one sentence, 15-25 words. Write only the sentence, no preamble, no quotes.


    Brand Strategy: {{brand_strategy}}'
providers:
- openai:gpt-5-mini-2025-08-07
- openai:gpt-5-2025-08-07
- openai:gpt-5.5
- anthropic:claude-haiku-4-5-20251001
- anthropic:claude-sonnet-4-6
- anthropic:claude-opus-4-7
defaultTest:
  assert:
  - type: similar
    value: '{{emotion_relevant}}'
    threshold: 0.7
tests: file://../tests3.yaml
