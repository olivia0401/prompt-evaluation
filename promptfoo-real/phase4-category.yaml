description: "Phase4 category — 推荐配方 x 6模型 x 3brief"

prompts:
  - label: "product"
    raw: |
      You are a brand strategy consultant. From the company information below, summarize the category it operates within, in one sentence, 15-20 words. Write only the sentence, no preamble, no quotes.
      
            Product: {{product}}

providers:
  - openai:gpt-5-mini-2025-08-07
  - openai:gpt-5-2025-08-07
  - openai:gpt-5.5
  - anthropic:claude-haiku-4-5-20251001
  - anthropic:claude-sonnet-4-6
  - anthropic:claude-opus-4-7

defaultTest:
  assert:
    - type: similar
      value: "{{category_relevant}}"
      threshold: 0.7

tests: file://tests3.yaml
