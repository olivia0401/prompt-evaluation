# Full service stack: Postgres + Redis + FastAPI + RQ worker + Streamlit.
#
#   docker compose up --build
#
# API      -> http://localhost:8000  (docs at /docs)
# Dashboard-> http://localhost:8501
#
# Put OPENAI_API_KEY / ANTHROPIC_API_KEY in .env (compose reads it automatically);
# the api and worker containers inherit them. Without keys the stack still boots
# and runs, but LLM calls come back as api_error rows.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: evals
      POSTGRES_PASSWORD: evals
      POSTGRES_DB: evals
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evals"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: uvicorn service.api:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+psycopg://evals:evals@postgres:5432/evals
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: python -m service.worker
    environment:
      DATABASE_URL: postgresql+psycopg://evals:evals@postgres:5432/evals
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build: .
    command: streamlit run service/dashboard.py --server.port 8501 --server.address 0.0.0.0
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  pgdata:
